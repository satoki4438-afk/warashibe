<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WARASHIBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --white: #ffffff; --gray: #f8f9fa; --border: #eeeeee; }
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background: var(--white); color: #333; padding-bottom: 70px; }
        
        /* ページ切り替え */
        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* ヘッダー */
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; color: var(--gold); font-weight: 900; }

        /* カード */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* ★【修正1】画像の高さを120pxから200pxに大きくしました */
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        .card-body { padding: 10px; }
        .btn { background: var(--gold); color: white; border: none; width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* プロフィール */
        .profile-card { background: #fffdf0; border: 1px solid #f3e5ab; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .avatar { font-size: 40px; margin-bottom: 10px; }

        /* ナビゲーション */
        nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { font-size: 0.7rem; color: #aaa; text-align: center; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .nav-icon { font-size: 1.2rem; display: block; }
    </style>
</head>
<body>

    <header><div class="logo">WARASHIBE</div><div>🔔</div></header>

    <div id="home" class="page active">
        <input type="text" placeholder="機体を探す..." style="width:100%; padding:10px; border-radius:20px; border:1px solid #ddd; margin-bottom:15px; box-sizing:border-box;">
        <div class="grid">
