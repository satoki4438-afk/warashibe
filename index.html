<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARASHIBE - Premium Gunpla Barter Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #E5C158; --gold-dark: #B8860B;
            --black: #1a1a1a; --white: #ffffff; --gray-light: #f5f5f5;
            --radius-lg: 16px; --radius-md: 10px;
        }
        body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background-color: var(--white); color: var(--black); }
        .mp-header { position: sticky; top: 0; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 1000; }
        .mp-header-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; height: 64px; display: flex; align-items: center; }
        .mp-logo { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .header-user-area { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .marketplace-content { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .marketplace-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .marketplace-item { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--gray-light); overflow: hidden; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; cursor: pointer; }
        .marketplace-item:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(212, 175, 55, 0.2); border-color: var(--gold); }
        .item-image { height: 220px; background: #333; overflow: hidden; }
        .item-image img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .marketplace-item:hover .item-image img { transform: scale(1.1); }
        .item-content { padding: 15px; }
        .item-title { font-weight: 700; font-size: 1rem; margin: 0 0 8px; height: 3em; overflow: hidden; }
        .match-indicator { position: absolute; top: 10px; right: 10px; background: #ef4444; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; z-index: 10; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .search-bar input { width: 100%; padding: 12px 20px; border-radius: var(--radius-md); border: 2px solid var(--gray-light); font-size: 1rem; outline: none; margin-bottom: 20px; }
        
        /* チャットモーダル */
        .chat-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .chat-modal.active { display: flex; }
        .chat-modal-content { background: #fff; width: 95%; max-width: 500px; height: 80vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 15px; background: #1a1a1a; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f0f2f5; }
        .message-bubble { padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; max-width: 80%; font-size: 0.9rem; }
        .message-partner .message-bubble { background: #fff; color: #333; }
        .message-own { display: flex; justify-content: flex-end; }
        .message-own .message-bubble { background: var(--gold); color: #fff; }
        .chat-input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
    </style>
</head>
<body>
    <header class="mp-header"><div class="mp-header-inner"><a href="#" class="mp-logo">WARASHIBE</a><div class="header-user-area">👤 ゲスト</div></div></header>
    <main class="marketplace-content">
        <input type="text" id="mainSearch" class="search-bar" placeholder="機体名で探す..." oninput="handleSearch(this.value)">
        <div class="marketplace-grid" id="itemGrid"></div>
    </main>

    <div class="chat-modal" id="chatModal">
        <div class="chat-modal-content">
            <div class="chat-header"><span id="chatTitle">交渉</span><button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">×</button></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="メッセージ..."><button onclick="sendMessage()" style="background:var(--gold); border:none; color:white; padding:10px 15px; border-radius:20px;">送信</button></div>
        </div>
    </div>

    <script>
        const mockItems = [
            { name: "MG サザビー Ver.Ka", category: "MG", condition: "未組立", match: 95, img: "https://images.unsplash.com/photo-1580130281320-0ef0754f2bf7?auto=format&fit=crop&q=80&w=800" },
            { name: "MG νガンダム Ver.Ka", category: "MG", condition: "組立済", match: 90, img: "https://images.unsplash.com/photo-1531693251400-38df35776dc7?auto=format&fit=crop&q=80&w=800" },
            { name: "HG エアリアル", category: "HG", condition: "未組立", match: 10, img: "https://images.unsplash.com/photo-1493217465235-0749b13c946e?auto=format&fit=crop&q=80&w=800" },
            { name: "RG Hi-νガンダム", category: "RG", condition: "未組立", match: 85, img: "https://images.unsplash.com/photo-1501504905252-473c47e087f8?auto=format&fit=crop&q=80&w=800" }
        ];

        function renderGrid(items) {
            document.getElementById('itemGrid').innerHTML = items.map(item => `
                <div class="marketplace-item" onclick="openChat('${item.name}')">
                    ${item.match > 80 ? `<div class="match-indicator">${item.match}% MATCH</div>` : ''}
                    <div class="item-image"><img src="${item.img}" alt="${item.name}"></div>
                    <div class="item-content"><h3 class="item-title">${item.name}</h3><div style="font-size:0.8rem; color:#888;">${item.category} | ${item.condition}</div></div>
                </div>
            `).join('');
        }

        function handleSearch(val) { renderGrid(mockItems.filter(i => i.name.toLowerCase().includes(val.toLowerCase()))); }
        function openChat(name) { 
            document.getElementById('chatTitle').innerText = name;
            document.getElementById('chatModal').classList.add('active');
            document.getElementById('chatMessages').innerHTML = '<div class="message-partner"><div class="message-bubble">こんにちは！交換しませんか？</div></div>';
        }
        function closeChat() { document.getElementById('chatModal').classList.remove('active'); }
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            document.getElementById('chatMessages').innerHTML += `<div class="message-own"><div class="message-bubble">${input.value}</div></div>`;
            input.value = "";
        }
        renderGrid(mockItems);
    </script>
</body>
</html>
