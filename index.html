<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARASHIBE - Premium Gunpla Barter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #E5C158; --black: #121212;
            --dark-gray: #1e1e1e; --white: #ffffff; --gray: #888;
        }
        body { 
            margin: 0; font-family: 'Noto Sans JP', sans-serif; 
            background-color: var(--black); color: var(--white);
            padding-bottom: 70px; /* メニューの高さ分 */
        }

        /* 画面切り替え制御 */
        .page { display: none; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ヘッダー */
        header { 
            padding: 15px 20px; background: var(--dark-gray); 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        /* カードデザイン */
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { 
            background: var(--dark-gray); border-radius: 12px; overflow: hidden; 
            border: 1px solid #333; position: relative;
        }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .match-badge { 
            position: absolute; top: 5px; right: 5px; background: #ff4757; 
            color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: bold;
        }

        /* 出品・マイページ用スタイル */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; padding: 12px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 8px; box-sizing: border-box;
        }
        .btn-gold { 
            background: var(--gold); color: black; border: none; padding: 12px; 
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* プロフィール */
        .profile-header { text-align: center; padding: 30px 0; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: #222; padding: 15px; border-radius: 10px; text-align: center; }

        /* 下部ナビゲーション */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--dark-gray); 
            display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333;
        }
        .nav-item { color: var(--gray); text-decoration: none; font-size: 0.7rem; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }

        /* チャット（簡易） */
        #chatOverlay { 
            position: fixed; inset: 0; background: black; z-index: 1000; display: none; 
            flex-direction: column;
        }
    </style>
</head>
<body>

    <header><div class="logo">WARASHIBE</div><div>🔔</div></header>

    <div id="page-home" class="page active">
        <div class="container">
            <input type
